<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Proxy 管理台</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #eaeaea;
      --text: #171717;
      --text-muted: #666666;
      --brand: #000000;
      --brand-hover: #333333;
      --brand-text: #ffffff;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --ring: rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 32px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    header p {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .card h2 {
      margin: 0 0 20px 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: var(--text-muted);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 16px;
    }

    .checkbox-row input {
      margin: 0;
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
    }

    .checkbox-row label {
      margin: 0;
      cursor: pointer;
      font-weight: 400;
    }

    .btn {
      background: var(--brand);
      color: var(--brand-text);
      border: 1px solid transparent;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: var(--brand-hover);
    }

    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn.secondary:hover {
      background: var(--bg);
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      font-size: 13px;
      overflow-x: auto;
      color: var(--text);
      margin: 0 0 20px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .search-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-row input {
      flex: 1;
    }

    .result-item {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--surface);
    }

    .result-item:hover {
      border-color: #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .result-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .pull-cmd {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      color: var(--text);
      margin-top: 12px;
      word-break: break-all;
    }

    .muted-note {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px 0;
    }

    .hint {
      margin: -8px 0 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .inline-row {
      display: flex;
      gap: 12px;
    }

    .inline-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .auth-actions {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auth-state {
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .search-row { flex-direction: column; }
      .btn { width: 100%; }
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Docker Proxy 管理台</h1>
    <p>配置 HTTPS、代理参数并搜索镜像</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>Web 访问认证</h2>
      <div class="hint">如果服务端启用了 WEB_BASIC_AUTH_USER / WEB_BASIC_AUTH_PASSWORD，请先填写再请求 API</div>
      <div class="inline-row">
        <div class="form-group">
          <label>Basic Auth 用户名</label>
          <input type="text" id="webBasicUser" placeholder="例如：admin" />
        </div>
        <div class="form-group">
          <label>Basic Auth 密码</label>
          <input type="password" id="webBasicPass" placeholder="请输入密码" />
        </div>
      </div>
      <div class="auth-actions">
        <button class="btn secondary" onclick="applyWebAuth()">确认并生效</button>
        <span id="webAuthState" class="auth-state">当前未应用</span>
      </div>
    </div>

    <div class="card">
      <h2>搜索镜像 <span style="font-weight:normal;color:var(--text-muted);font-size:14px">(前 10 条)</span></h2>
      <div class="search-row">
        <input type="text" id="searchQuery" placeholder="输入镜像名称，例如 nginx" onkeydown="if(event.key==='Enter') searchImages()" />
        <button class="btn" onclick="searchImages()">搜索</button>
      </div>
      <div id="searchResults">
        <div class="muted-note">请先搜索想查找的镜像<br><span style="font-size:12px;margin-top:8px;display:block">单击结果项即可复制对应的 docker pull 命令</span></div>
      </div>
    </div>

    <div class="card">
      <h2>代理配置</h2>
      <pre id="config">加载中...</pre>
      
      <div class="form-group">
        <label>Public Base URL</label>
        <input type="text" id="publicBaseUrl" placeholder="https://docker-proxy.example.com" />
      </div>
      
      <div class="checkbox-row">
        <input id="enableHttps" type="checkbox" />
        <label for="enableHttps">启用 HTTPS</label>
      </div>
      
      <div class="form-group">
        <label>TLS Cert File</label>
        <input type="text" id="tlsCertFile" placeholder="例如：/etc/ssl/certs/fullchain.pem" />
      </div>
      
      <div class="form-group">
        <label>TLS Key File</label>
        <input type="text" id="tlsKeyFile" placeholder="例如：/etc/ssl/private/privkey.pem" />
      </div>
      
      <div class="form-group">
        <label>Upstream Registry</label>
        <input type="text" id="upstreamRegistry" placeholder="https://registry-1.docker.io" />
      </div>
      
      <div class="form-group">
        <label>Upstream Auth Realm</label>
        <input type="text" id="upstreamAuthRealm" placeholder="https://auth.docker.io/token" />
      </div>
      
      <div class="form-group">
        <label>Admin Token（若服务端启用，则必填）</label>
        <input type="password" id="adminToken" placeholder="输入管理令牌以保存配置或清空缓存" />
      </div>
      
      <button class="btn" style="width: 100%; margin-top: 8px;" onclick="saveConfig()">保存配置</button>
    </div>

    <div class="card">
      <h2>Docker 客户端配置</h2>
      <div class="hint">将以下内容写入 /etc/docker/daemon.json，然后重启 Docker 服务</div>
      <pre id="daemonJson">加载中...</pre>
      <button class="btn secondary" onclick="copyDaemonConfig()">一键复制 daemon.json</button>
    </div>

    <div class="card">
      <h2>运行状态</h2>
      <pre id="stats">加载中...</pre>
      <div class="btn-group">
        <button class="btn secondary" onclick="refreshStats()">刷新状态</button>
        <button class="btn secondary" style="color:#dc2626;border-color:#fca5a5" onclick="clearCache()">清空缓存</button>
      </div>
    </div>
  </div>

  <script>
    let webAuthApplied = false;

    function getWebBasicAuthHeader() {
      if (!webAuthApplied) {
        return '';
      }
      const user = document.getElementById('webBasicUser').value.trim();
      const pass = document.getElementById('webBasicPass').value;
      if (!user && !pass) {
        return '';
      }
      return 'Basic ' + btoa(`${user}:${pass}`);
    }

    function setWebAuthState(message) {
      document.getElementById('webAuthState').textContent = message;
    }

    async function applyWebAuth() {
      webAuthApplied = true;
      setWebAuthState('认证已应用，正在验证...');
      const res = await api('/api/admin/stats');
      if (res.status === 401) {
        webAuthApplied = false;
        setWebAuthState('认证失败，请检查用户名和密码');
        alert('Web 访问认证失败：用户名或密码不正确');
        return;
      }
      setWebAuthState('认证已应用');
      await loadConfig();
      await refreshStats();
    }

    async function api(path, options = {}) {
      const headers = { ...(options.headers || {}) };
      const basicAuth = getWebBasicAuthHeader();
      if (basicAuth) {
        headers['Authorization'] = basicAuth;
      }

      const response = await fetch(path, { ...options, headers });
      const text = await response.text();
      try { return { ok: response.ok, status: response.status, data: JSON.parse(text) }; }
      catch { return { ok: response.ok, status: response.status, data: { raw: text } }; }
    }

    async function loadConfig() {
      const res = await api('/api/admin/config');
      if (res.status === 401) {
        document.getElementById('config').textContent = '认证失败：请先填写上方 Web 访问认证信息';
        refreshDaemonConfig()
        return
      }
      document.getElementById('config').textContent = JSON.stringify(res.data, null, 2);
      if (res.ok) {
        document.getElementById('publicBaseUrl').value = res.data.public_base_url || '';
        document.getElementById('enableHttps').checked = !!res.data.enable_https;
        document.getElementById('tlsCertFile').value = res.data.tls_cert_file || '';
        document.getElementById('tlsKeyFile').value = res.data.tls_key_file || '';
        document.getElementById('upstreamRegistry').value = res.data.upstream_registry || '';
        document.getElementById('upstreamAuthRealm').value = res.data.upstream_auth_realm || '';
      }
      refreshDaemonConfig();
    }

    async function saveConfig() {
      const body = {
        public_base_url: document.getElementById('publicBaseUrl').value,
        enable_https: document.getElementById('enableHttps').checked,
        tls_cert_file: document.getElementById('tlsCertFile').value,
        tls_key_file: document.getElementById('tlsKeyFile').value,
        upstream_registry: document.getElementById('upstreamRegistry').value,
        upstream_auth_realm: document.getElementById('upstreamAuthRealm').value,
      };
      const token = document.getElementById('adminToken').value.trim();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['X-Admin-Token'] = token;
      const res = await api('/api/admin/config', { method: 'PUT', headers, body: JSON.stringify(body) });
      if (!res.ok) {
        alert('保存失败：' + JSON.stringify(res.data));
        return;
      }
      alert('保存成功，服务正在自动重启，页面将在 2 秒后刷新');
      setTimeout(() => window.location.reload(), 2000);
    }

    async function refreshStats() {
      const res = await api('/api/admin/stats');
      if (res.status === 401) {
        document.getElementById('stats').textContent = '认证失败：请先填写上方 Web 访问认证信息';
        return;
      }
      document.getElementById('stats').textContent = JSON.stringify(res.data, null, 2);
    }

    async function clearCache() {
      const token = document.getElementById('adminToken').value.trim();
      const headers = {};
      if (token) headers['X-Admin-Token'] = token;
      const res = await api('/api/admin/cache', { method: 'DELETE', headers });
      alert(res.ok ? '缓存已清空' : '清空失败：' + JSON.stringify(res.data));
      await refreshStats();
    }

    async function searchImages() {
      const q = document.getElementById('searchQuery').value.trim();
      if (!q) return;
      const res = await api('/api/search?q=' + encodeURIComponent(q));
      const container = document.getElementById('searchResults');
      container.innerHTML = '';
      const results = res.data.results || [];
      if (!results.length) {
        container.textContent = '无结果';
        return;
      }
      results.forEach(item => {
        const div = document.createElement('div');
        div.className = 'result-item';
        const name = normalizeRepoName(item.repo_name || item.name || '-');
        const desc = item.short_description || item.description || '';
        const stars = item.star_count ?? item.pull_count ?? '-';
        const pullCmd = buildPullCommand(name);
        div.innerHTML = `
          <div class="result-title">
            <span>${name}</span>
            <span style="font-weight:normal;color:var(--text-muted);font-size:13px">⭐ ${stars}</span>
          </div>
          <div class="result-desc">${desc}</div>
          <div class="pull-cmd">${pullCmd}</div>
        `;
        div.title = '单击复制 docker pull 命令';
        div.onclick = async () => {
          const ok = await copyToClipboard(pullCmd);
          if (ok) {
            alert('已复制：' + pullCmd);
          } else {
            alert('复制失败，请手动复制：' + pullCmd);
          }
        };
        container.appendChild(div);
      });
    }

    function normalizeRepoName(name) {
      const cleaned = String(name || '').trim().replace(/^\/+|\/+$/g, '');
      if (!cleaned) return 'library/unknown';
      if (cleaned.includes('/')) return cleaned;
      return `library/${cleaned}`;
    }

    function buildPullCommand(repoName) {
      const base = getPullBaseURL();
      return `docker pull ${base}/${repoName}`;
    }

    function getPullBaseURL() {
      const configured = document.getElementById('publicBaseUrl').value.trim();
      const source = configured || window.location.origin || window.location.host;

      try {
        if (source.startsWith('http://') || source.startsWith('https://')) {
          const parsed = new URL(source);
          return parsed.host;
        }
      } catch (_) {}

      return source.replace(/^https?:\/\//i, '').replace(/\/+$/, '');
    }

    function getMirrorURL() {
      const configured = document.getElementById('publicBaseUrl').value.trim();
      if (configured) {
        if (configured.startsWith('http://') || configured.startsWith('https://')) {
          return configured.replace(/\/+$/, '');
        }
        const protocol = window.location.protocol === 'https:' ? 'https://' : 'http://';
        return (protocol + configured).replace(/\/+$/, '');
      }
      return window.location.origin.replace(/\/+$/, '');
    }

    function buildDaemonConfig() {
      const mirror = getMirrorURL();
      return JSON.stringify({
        "registry-mirrors": [mirror]
      }, null, 2);
    }

    function refreshDaemonConfig() {
      document.getElementById('daemonJson').textContent = buildDaemonConfig();
    }

    async function copyDaemonConfig() {
      const daemonConfig = buildDaemonConfig();
      const ok = await copyToClipboard(daemonConfig);
      if (ok) {
        alert('已复制 daemon.json 配置');
      } else {
        alert('复制失败，请手动复制');
      }
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (_) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(textArea);
        return ok;
      }
    }

    document.getElementById('publicBaseUrl').addEventListener('input', refreshDaemonConfig);
    loadConfig();
    refreshStats();
  </script>
</body>
</html>
