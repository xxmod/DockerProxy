<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Proxy 管理台</title>
  <style>
    :root {
      --bg: #eef1f4;
      --surface: #ffffff;
      --brand: #38df91;
      --brand-soft: #bfffe3;
      --text: #10243a;
      --text-muted: #4b5f76;
      --border: #d6dce4;
      --shadow: 0 8px 20px rgba(16, 36, 58, 0.05);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    .hero {
      background: #ffffff;
      padding: 34px 16px 30px;
      text-align: center;
      border-bottom: 1px solid #dbe2ea;
    }

    h1 {
      margin: 0;
      color: var(--brand);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .hero p {
      margin: 14px 0 0;
      color: var(--text-muted);
      font-size: 16px;
    }

    .container {
      max-width: 1100px;
      margin: 36px auto;
      padding: 0 18px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      background: var(--surface);
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    h2 {
      margin: 0 0 12px;
      color: var(--brand);
      font-size: 28px;
      font-weight: 700;
    }

    h3 {
      margin: 0 0 14px;
      color: var(--brand);
      font-size: 24px;
      font-weight: 700;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #1e3a57;
      font-weight: 600;
    }

    input, button, textarea {
      width: 100%;
      padding: 14px 16px;
      margin-top: 8px;
      border-radius: 12px;
      border: 1px solid #c8d1dc;
      font-size: 16px;
      transition: all 0.2s ease;
      background: #ffffff;
      color: var(--text);
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(56, 223, 145, 0.2);
    }

    .search-row {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .search-row input {
      margin-top: 0;
      flex: 1;
    }

    .search-row button {
      margin-top: 0;
      width: 170px;
      flex: 0 0 auto;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .checkbox-row input[type="checkbox"] {
      width: auto;
      margin: 0;
      accent-color: var(--brand);
      transform: scale(1.25);
    }

    .checkbox-row label {
      margin: 0;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      border-color: var(--brand);
      background: linear-gradient(90deg, var(--brand) 0%, #9cf4c8 100%);
      color: #072c1a;
      font-weight: 700;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(56, 223, 145, 0.3);
    }

    pre {
      background: var(--brand-soft);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      color: #06341f;
      font-size: 14px;
    }

    .result-item {
      border-bottom: 1px solid #d9e0e8;
      padding: 14px 0;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.15s ease;
      border-radius: 8px;
    }

    .result-item:hover {
      background: #f5fff9;
    }

    .result-item small {
      color: #2f5c7e;
      font-size: 13px;
    }

    .pull-cmd {
      margin-top: 6px;
      padding: 8px 10px;
      background: #f6fffb;
      border: 1px dashed #9deec6;
      border-radius: 8px;
      font-size: 13px;
      color: #1f4a37;
      word-break: break-all;
    }

    .muted-note {
      color: #5e7084;
      text-align: center;
      font-size: 16px;
      margin: 10px 0 0;
    }

    @media (max-width: 960px) {
      h1 { font-size: 26px; }
      h2 { font-size: 22px; }
      h3 { font-size: 20px; }
      .hero p, .muted-note { font-size: 18px; }
      input, button, textarea, .result-item { font-size: 16px; }
      pre { font-size: 14px; }
      .search-row { flex-direction: column; align-items: stretch; }
      .search-row button { width: 100%; }
      .container { margin: 20px auto; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Docker Proxy 管理台</h1>
    <p>配置 HTTPS、代理参数并搜索镜像</p>
  </div>

  <div class="container">
    <div class="card">
      <h3>搜索镜像（前 10 条）</h3>
      <div class="search-row">
        <input id="searchQuery" placeholder="输入镜像名称，例如 nginx" />
        <button onclick="searchImages()">搜索</button>
      </div>
      <div id="searchResults" class="muted-note">请先搜索想要的镜像</div>
      <div class="muted-note" style="font-size:13px; margin-top:8px;">单击某条镜像结果即可复制可直接执行的 docker pull 命令</div>
    </div>

    <div class="card">
      <h3>代理配置</h3>
      <pre id="config">加载中...</pre>
      <label>Public Base URL</label>
      <input id="publicBaseUrl" placeholder="https://docker-proxy.example.com" />
      <div class="checkbox-row">
        <input id="enableHttps" type="checkbox" />
        <label for="enableHttps">启用 HTTPS</label>
      </div>
      <label>TLS Cert File</label>
      <input id="tlsCertFile" placeholder="例如：/etc/ssl/certs/fullchain.pem" />
      <label>TLS Key File</label>
      <input id="tlsKeyFile" placeholder="例如：/etc/ssl/private/privkey.pem" />
      <label>Upstream Registry</label>
      <input id="upstreamRegistry" placeholder="https://registry-1.docker.io" />
      <label>Upstream Auth Realm</label>
      <input id="upstreamAuthRealm" placeholder="https://auth.docker.io/token" />
      <label>Admin Token（可选）</label>
      <input id="adminToken" placeholder="若服务端配置了 ADMIN_TOKEN，这里必须填写" />
      <button onclick="saveConfig()">保存配置</button>
    </div>

    <div class="card">
      <h3>运行状态</h3>
      <pre id="stats">加载中...</pre>
      <button onclick="refreshStats()">刷新状态</button>
      <button onclick="clearCache()">清空缓存</button>
    </div>
  </div>

  <script>
    async function api(path, options = {}) {
      const response = await fetch(path, options);
      const text = await response.text();
      try { return { ok: response.ok, data: JSON.parse(text) }; }
      catch { return { ok: response.ok, data: { raw: text } }; }
    }

    async function loadConfig() {
      const res = await api('/api/admin/config');
      document.getElementById('config').textContent = JSON.stringify(res.data, null, 2);
      if (res.ok) {
        document.getElementById('publicBaseUrl').value = res.data.public_base_url || '';
        document.getElementById('enableHttps').checked = !!res.data.enable_https;
        document.getElementById('tlsCertFile').value = res.data.tls_cert_file || '';
        document.getElementById('tlsKeyFile').value = res.data.tls_key_file || '';
        document.getElementById('upstreamRegistry').value = res.data.upstream_registry || '';
        document.getElementById('upstreamAuthRealm').value = res.data.upstream_auth_realm || '';
      }
    }

    async function saveConfig() {
      const body = {
        public_base_url: document.getElementById('publicBaseUrl').value,
        enable_https: document.getElementById('enableHttps').checked,
        tls_cert_file: document.getElementById('tlsCertFile').value,
        tls_key_file: document.getElementById('tlsKeyFile').value,
        upstream_registry: document.getElementById('upstreamRegistry').value,
        upstream_auth_realm: document.getElementById('upstreamAuthRealm').value,
      };
      const token = document.getElementById('adminToken').value.trim();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['X-Admin-Token'] = token;
      const res = await api('/api/admin/config', { method: 'PUT', headers, body: JSON.stringify(body) });
      alert(res.ok ? '保存成功' : '保存失败：' + JSON.stringify(res.data));
      await loadConfig();
      await refreshStats();
    }

    async function refreshStats() {
      const res = await api('/api/admin/stats');
      document.getElementById('stats').textContent = JSON.stringify(res.data, null, 2);
    }

    async function clearCache() {
      const token = document.getElementById('adminToken').value.trim();
      const headers = {};
      if (token) headers['X-Admin-Token'] = token;
      const res = await api('/api/admin/cache', { method: 'DELETE', headers });
      alert(res.ok ? '缓存已清空' : '清空失败：' + JSON.stringify(res.data));
      await refreshStats();
    }

    async function searchImages() {
      const q = document.getElementById('searchQuery').value.trim();
      if (!q) return;
      const res = await api('/api/search?q=' + encodeURIComponent(q));
      const container = document.getElementById('searchResults');
      container.innerHTML = '';
      const results = res.data.results || [];
      if (!results.length) {
        container.textContent = '无结果';
        return;
      }
      results.forEach(item => {
        const div = document.createElement('div');
        div.className = 'result-item';
        const name = normalizeRepoName(item.repo_name || item.name || '-');
        const desc = item.short_description || item.description || '';
        const stars = item.star_count ?? item.pull_count ?? '-';
        const pullCmd = buildPullCommand(name);
        div.innerHTML = `<strong>${name}</strong><div>${desc}</div><small>热度：${stars}</small><div class="pull-cmd">${pullCmd}</div>`;
        div.title = '单击复制 docker pull 命令';
        div.onclick = async () => {
          const ok = await copyToClipboard(pullCmd);
          if (ok) {
            alert('已复制：' + pullCmd);
          } else {
            alert('复制失败，请手动复制：' + pullCmd);
          }
        };
        container.appendChild(div);
      });
    }

    function normalizeRepoName(name) {
      const cleaned = String(name || '').trim().replace(/^\/+|\/+$/g, '');
      if (!cleaned) return 'library/unknown';
      if (cleaned.includes('/')) return cleaned;
      return `library/${cleaned}`;
    }

    function buildPullCommand(repoName) {
      const base = getPullBaseURL();
      return `docker pull ${base}/${repoName}`;
    }

    function getPullBaseURL() {
      const configured = document.getElementById('publicBaseUrl').value.trim();
      const source = configured || window.location.origin || window.location.host;

      try {
        if (source.startsWith('http://') || source.startsWith('https://')) {
          const parsed = new URL(source);
          return parsed.host;
        }
      } catch (_) {}

      return source.replace(/^https?:\/\//i, '').replace(/\/+$/, '');
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (_) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(textArea);
        return ok;
      }
    }

    loadConfig();
    refreshStats();
  </script>
</body>
</html>
