<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Proxy 管理台</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --brand: #38df91;
      --brand-soft: #bfffe3;
      --text: #0f172a;
      --text-muted: #475569;
      --border: #98f3c5;
      --shadow: 0 8px 24px rgba(56, 223, 145, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: linear-gradient(180deg, #ffffff 0%, #f3fff9 100%);
      color: var(--text);
      line-height: 1.45;
    }

    h1 {
      margin: 0 0 6px;
      color: #0b3b27;
    }

    p {
      margin: 0 0 18px;
      color: var(--text-muted);
    }

    h3 {
      margin: 0 0 12px;
      color: #115737;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #145a39;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    input, button, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      transition: all 0.2s ease;
      background: #ffffff;
      color: var(--text);
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(56, 223, 145, 0.2);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .checkbox-row input[type="checkbox"] {
      width: auto;
      margin: 0;
      accent-color: var(--brand);
      transform: scale(1.1);
    }

    .checkbox-row label {
      margin: 0;
    }

    button {
      cursor: pointer;
      border-color: var(--brand);
      background: linear-gradient(180deg, #7ef2bc 0%, var(--brand) 100%);
      color: #05351f;
      font-weight: 700;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(56, 223, 145, 0.3);
    }

    pre {
      background: var(--brand-soft);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 10px;
      overflow: auto;
      color: #06341f;
    }

    .result-item {
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }

    .result-item small {
      color: #166943;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      body { padding: 16px; }
    }
  </style>
</head>
<body>
  <h1>Docker Proxy 管理台</h1>
  <p>用于管理代理配置、缓存和镜像搜索。</p>

  <div class="grid">
    <div class="card">
      <h3>当前配置</h3>
      <pre id="config">加载中...</pre>
      <label>Public Base URL</label>
      <input id="publicBaseUrl" placeholder="https://docker-proxy.example.com" />
      <div class="checkbox-row">
        <input id="enableHttps" type="checkbox" />
        <label for="enableHttps">启用 HTTPS</label>
      </div>
      <label>TLS Cert File</label>
      <input id="tlsCertFile" placeholder="例如：/etc/ssl/certs/fullchain.pem" />
      <label>TLS Key File</label>
      <input id="tlsKeyFile" placeholder="例如：/etc/ssl/private/privkey.pem" />
      <label>Upstream Registry</label>
      <input id="upstreamRegistry" placeholder="https://registry-1.docker.io" />
      <label>Upstream Auth Realm</label>
      <input id="upstreamAuthRealm" placeholder="https://auth.docker.io/token" />
      <label>Admin Token（可选）</label>
      <input id="adminToken" placeholder="若服务端配置了 ADMIN_TOKEN，这里必须填写" />
      <button onclick="saveConfig()">保存配置</button>
    </div>

    <div class="card">
      <h3>运行状态</h3>
      <pre id="stats">加载中...</pre>
      <button onclick="refreshStats()">刷新状态</button>
      <button onclick="clearCache()">清空缓存</button>
    </div>
  </div>

  <div class="card" style="margin-top:16px;">
    <h3>镜像搜索（Docker Hub）</h3>
    <input id="searchQuery" placeholder="例如：nginx" />
    <button onclick="searchImages()">搜索</button>
    <div id="searchResults"></div>
  </div>

  <script>
    async function api(path, options = {}) {
      const response = await fetch(path, options);
      const text = await response.text();
      try { return { ok: response.ok, data: JSON.parse(text) }; }
      catch { return { ok: response.ok, data: { raw: text } }; }
    }

    async function loadConfig() {
      const res = await api('/api/admin/config');
      document.getElementById('config').textContent = JSON.stringify(res.data, null, 2);
      if (res.ok) {
        document.getElementById('publicBaseUrl').value = res.data.public_base_url || '';
        document.getElementById('enableHttps').checked = !!res.data.enable_https;
        document.getElementById('tlsCertFile').value = res.data.tls_cert_file || '';
        document.getElementById('tlsKeyFile').value = res.data.tls_key_file || '';
        document.getElementById('upstreamRegistry').value = res.data.upstream_registry || '';
        document.getElementById('upstreamAuthRealm').value = res.data.upstream_auth_realm || '';
      }
    }

    async function saveConfig() {
      const body = {
        public_base_url: document.getElementById('publicBaseUrl').value,
        enable_https: document.getElementById('enableHttps').checked,
        tls_cert_file: document.getElementById('tlsCertFile').value,
        tls_key_file: document.getElementById('tlsKeyFile').value,
        upstream_registry: document.getElementById('upstreamRegistry').value,
        upstream_auth_realm: document.getElementById('upstreamAuthRealm').value,
      };
      const token = document.getElementById('adminToken').value.trim();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['X-Admin-Token'] = token;
      const res = await api('/api/admin/config', { method: 'PUT', headers, body: JSON.stringify(body) });
      alert(res.ok ? '保存成功' : '保存失败：' + JSON.stringify(res.data));
      await loadConfig();
      await refreshStats();
    }

    async function refreshStats() {
      const res = await api('/api/admin/stats');
      document.getElementById('stats').textContent = JSON.stringify(res.data, null, 2);
    }

    async function clearCache() {
      const token = document.getElementById('adminToken').value.trim();
      const headers = {};
      if (token) headers['X-Admin-Token'] = token;
      const res = await api('/api/admin/cache', { method: 'DELETE', headers });
      alert(res.ok ? '缓存已清空' : '清空失败：' + JSON.stringify(res.data));
      await refreshStats();
    }

    async function searchImages() {
      const q = document.getElementById('searchQuery').value.trim();
      if (!q) return;
      const res = await api('/api/search?q=' + encodeURIComponent(q));
      const container = document.getElementById('searchResults');
      container.innerHTML = '';
      const results = res.data.results || [];
      if (!results.length) {
        container.textContent = '无结果';
        return;
      }
      results.forEach(item => {
        const div = document.createElement('div');
        div.className = 'result-item';
        const name = item.repo_name || item.name || '-';
        const desc = item.short_description || item.description || '';
        const stars = item.star_count ?? item.pull_count ?? '-';
        div.innerHTML = `<strong>${name}</strong><div>${desc}</div><small>热度：${stars}</small>`;
        container.appendChild(div);
      });
    }

    loadConfig();
    refreshStats();
  </script>
</body>
</html>
